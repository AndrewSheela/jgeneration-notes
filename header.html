<script>
    // Global routing logic for the header search
    function handleHeaderSearch(event) {
        if (event.key === 'Enter') {
            const query = encodeURIComponent(event.target.value.trim());
            
            const localSearch = document.getElementById('songSearch');
            if (localSearch) {
                localSearch.value = event.target.value;
                if (typeof renderSongs === 'function') {
                    renderSongs();
                }
            } else {
                window.location.href = '/?search=' + query;
            }
        }
    }
</script>
<script>
    fetch("/header.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("global-header").innerHTML = data;
            
            // Sync the search bar text if coming from a redirected search
            const params = new URLSearchParams(window.location.search);
            const activeQuery = params.get('search');
            if (activeQuery) {
                const headerInput = document.getElementById('globalHeaderSearch');
                if (headerInput) headerInput.value = decodeURIComponent(activeQuery);
            }
        });
</script>
