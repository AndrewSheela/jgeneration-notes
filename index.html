<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Notes Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .song-row {
            transition: all 0.2s ease;
        }
        .song-row:hover {
            background-color: #f1f5f9;
        }
        .filter-btn {
            color: #0f172a; 
            background-color: transparent;
        }
        .filter-btn.active {
            background-color: #2563eb !important;
            color: white !important;
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="min-h-screen">
<div id="global-header"></div>
    <!-- Unique, non-standard layout container to stay hidden from global search conflicts -->
    <main class="local-notes-wrapper max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-10">
        <div class="glass sticky top-6 z-20 p-5 rounded-2xl shadow-xl mb-8">
            <div class="flex flex-col gap-4">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex items-center space-x-2 text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                        </svg>
                        <span class="text-sm font-bold uppercase tracking-wider">Select Language</span>
                    </div>
                    <input type="text" id="songSearch" placeholder="Search songs, artists, or albums..." onkeyup="renderSongs()" class="px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-64 text-slate-900 bg-white">
                </div>
                
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <div class="flex flex-wrap gap-2" id="filter-container">
                        <button data-lang="all" onclick="setFilter('all')" class="filter-btn active px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">All</button>
                        <button data-lang="Tamil" onclick="setFilter('Tamil')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Tamil</button>
                        <button data-lang="Telugu" onclick="setFilter('Telugu')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Telugu</button>
                        <button data-lang="Kannada" onclick="setFilter('Kannada')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Kannada</button>
                        <button data-lang="Hindi" onclick="setFilter('Hindi')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Hindi</button>
                        <button data-lang="Malayalam" onclick="setFilter('Malayalam')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Malayalam</button>
                        <button data-lang="English" onclick="setFilter('English')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">English</button>
                    </div>

                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <button onclick="openModal('album')" class="w-1/2 sm:w-auto bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 px-4 py-2 rounded-xl text-sm font-bold transition-all inline-flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                            Browse Albums
                        </button>
                        <button onclick="openModal('artist')" class="w-1/2 sm:w-auto bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200 px-4 py-2 rounded-xl text-sm font-bold transition-all inline-flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            Browse Artists
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="local-table-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-20">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Song Name</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider hidden sm:table-cell">Artist & Album</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Language</th>
                            <th class="px-6 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="local-songs-body"></tbody>
                </table>
            </div>
            <div id="pagination-container" class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex items-center justify-between flex-wrap gap-4"></div>
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300">
            <h3 class="mt-4 text-lg font-semibold text-slate-900">No matching songs found</h3>
        </div>
    </main>

    <div id="browseModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] flex flex-col shadow-2xl overflow-hidden scale-95 transition-transform duration-300">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800">Browse</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="px-6 py-3 bg-slate-50 border-b border-slate-100">
                <input type="text" id="modalSearchInput" placeholder="Filter list..." onkeyup="filterModalItems()" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white text-slate-900">
            </div>
            <div id="modalContent" class="p-6 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 gap-3 bg-slate-50"></div>
        </div>
    </div>

    <div id="footer"></div>

    <script>
        if (typeof window.notesAppInitialized === "undefined") {
            window.notesAppInitialized = true;

            fetch("/footer.html").then(res => res.text()).then(data => document.getElementById("footer").innerHTML = data);
        }

        let currentFilter = 'all';
        let currentPage = 1;
        const songsPerPage = 100;
        let lastSearchVal = "";
        let currentModalMode = ''; 
        let currentModalData = {}; 

        function setFilter(lang) {
            currentFilter = lang;
            currentPage = 1; 
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            renderSongs();
        }

        function getLangBadgeClass(lang) {
            switch(lang) {
                case 'Tamil': return 'bg-pink-100 text-pink-700 border border-pink-200';
                case 'Telugu': return 'bg-cyan-100 text-cyan-700 border border-cyan-200';
                case 'Hindi': return 'bg-amber-100 text-amber-700 border border-amber-200';
                case 'English': return 'bg-emerald-100 text-emerald-700 border border-emerald-200';
                case 'Malayalam': return 'bg-purple-100 text-purple-700 border border-purple-200';
                case 'Kannada': return 'bg-indigo-100 text-indigo-700 border border-indigo-200';
                default: return 'bg-slate-100 text-slate-600 border border-slate-200';
            }
        }

        function openModal(mode) {
            currentModalMode = mode;
            const modal = document.getElementById('browseModal');
            const title = document.getElementById('modalTitle');
            const searchInput = document.getElementById('modalSearchInput');
            searchInput.value = '';
            
            currentModalData = {};
            songData.forEach(song => {
                const key = mode === 'album' ? song.album : song.artist;
                if(key) currentModalData[key] = (currentModalData[key] || 0) + 1;
            });

            title.innerText = mode === 'album' ? 'Browse by Album' : 'Browse by Artist';
            filterModalItems();
            modal.classList.remove('hidden');
            setTimeout(() => modal.firstElementChild.classList.remove('scale-95'), 10);
            setTimeout(() => searchInput.focus(), 100);
        }

        function filterModalItems() {
            const query = document.getElementById('modalSearchInput').value.toLowerCase();
            const content = document.getElementById('modalContent');
            const sortedKeys = Object.keys(currentModalData).sort();
            const filteredKeys = sortedKeys.filter(key => key.toLowerCase().includes(query));

            if(filteredKeys.length === 0) {
                content.innerHTML = `<div class="col-span-full text-center py-6 text-sm text-slate-400 font-medium">No matches found...</div>`;
                return;
            }

            content.innerHTML = filteredKeys.map(key => {
                const count = currentModalData[key];
                return `
                    <button onclick="applyMetaSearch('${key.replace(/'/g, "\\'")}')" class="flex items-center justify-between p-4 bg-white hover:bg-blue-50 border border-slate-200 hover:border-blue-300 rounded-xl text-left transition-all group">
                        <div>
                            <div class="font-bold text-slate-800 group-hover:text-blue-700 transition-colors">${key}</div>
                            <div class="text-xs text-slate-400 mt-0.5">${count} ${count === 1 ? 'song' : 'songs'}</div>
                        </div>
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-blue-500 transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                `;
            }).join('');
        }

        function closeModal() {
            const modal = document.getElementById('browseModal');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 150);
        }

        function applyMetaSearch(value) {
            closeModal();
            setFilter('all');
            const searchInput = document.getElementById('songSearch');
            searchInput.value = value;
            renderSongs();
            searchInput.focus();
        }

        document.getElementById('browseModal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        function changePage(page) {
            currentPage = page;
            renderSongs();
            document.querySelector('.local-notes-wrapper').scrollIntoView({ behavior: 'smooth' });
        }

        function renderPaginationControls(totalCount, totalPages) {
            const paginationContainer = document.getElementById('pagination-container');
            if (!paginationContainer) return;

            if (totalPages <= 1) {
                paginationContainer.innerHTML = `<div class="text-xs font-semibold text-slate-500">Showing all ${totalCount} songs</div>`;
                return;
            }

            const startIdx = (currentPage - 1) * songsPerPage + 1;
            const endIdx = Math.min(currentPage * songsPerPage, totalCount);
            let buttonsHtml = '';
            
            buttonsHtml += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold text-slate-600 hover:bg-slate-100 disabled:opacity-50 disabled:pointer-events-none transition-colors">Previous</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (totalPages <= 6 || i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    buttonsHtml += `<button onclick="changePage(${i})" class="w-8 h-8 rounded-lg text-xs font-bold transition-all ${currentPage === i ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}">${i}</button>`;
                } else if (i === 2 && currentPage > 3) {
                    buttonsHtml += `<span class="text-slate-400 text-xs px-1">...</span>`;
                } else if (i === totalPages - 1 && currentPage < totalPages - 2) {
                    buttonsHtml += `<span class="text-slate-400 text-xs px-1">...</span>`;
                }
            }

            buttonsHtml += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold text-slate-600 hover:bg-slate-100 disabled:opacity-50 disabled:pointer-events-none transition-colors">Next</button>`;

            paginationContainer.innerHTML = `
                <div class="text-xs font-semibold text-slate-500">Showing <span class="text-slate-800">${startIdx}</span> to <span class="text-slate-800">${endIdx}</span> of <span class="text-slate-800">${totalCount}</span> songs</div>
                <div class="flex items-center gap-1">${buttonsHtml}</div>
            `;
        }

        function renderSongs() {
            const listBody = document.getElementById('local-songs-body');
            if (!listBody) return;
            listBody.innerHTML = '';
            
            const searchVal = document.getElementById('songSearch').value.toLowerCase();
            const emptyState = document.getElementById('empty-state');
            const tableContainer = document.getElementById('local-table-card');

            if (searchVal !== lastSearchVal) {
                currentPage = 1;
                lastSearchVal = searchVal;
            }

            const filtered = songData.filter(song => {
                const matchesLang = currentFilter === 'all' || song.lang === currentFilter;
                const matchesSearch = song.name.toLowerCase().includes(searchVal) || 
                                     song.artist.toLowerCase().includes(searchVal) ||
                                     song.album.toLowerCase().includes(searchVal);
                return matchesLang && matchesSearch;
            });

            if (filtered.length > 0) {
                const totalPages = Math.ceil(filtered.length / songsPerPage);
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const startIndex = (currentPage - 1) * songsPerPage;
                const endIndex = startIndex + songsPerPage;
                const paginatedSongs = filtered.slice(startIndex, endIndex);

                listBody.innerHTML = paginatedSongs.map(song => `
                    <tr class="song-row border-b border-slate-100 group">
                        <td class="px-6 py-4">
                            <div class="font-bold text-indigo-900 hover:text-indigo-700 transition-colors text-base">${song.name}</div>
                            <div class="sm:hidden text-xs italic mt-1">
                                <span class="text-emerald-600 font-semibold">${song.artist}</span> <span class="text-slate-300 mx-1">•</span> <span class="text-purple-600 font-medium">${song.album}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 hidden sm:table-cell">
                            <div class="text-sm font-bold text-emerald-600">${song.artist}</div>
                            <div class="text-xs font-semibold text-purple-500 mt-0.5">${song.album}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="${getLangBadgeClass(song.lang)} text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wide">${song.lang}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button 
                                data-url="${song.url}" 
                                onclick="window.open(this.getAttribute('data-url'), '_blank')" 
                                class="inline-flex items-center text-blue-600 hover:text-blue-800 font-bold text-sm bg-transparent border-none cursor-pointer p-0 outline-none focus:outline-none"
                            >
                                Notes <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </td>
                    </tr>
                `).join('');

                renderPaginationControls(filtered.length, totalPages);
                tableContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
            } else {
                tableContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

    // Final cleanly targeted init block
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            if (searchQuery) {
                const searchInput = document.getElementById('songSearch');
                if (searchInput) {
                    searchInput.value = decodeURIComponent(searchQuery);
                }
            }
            renderSongs();
        });
    </script>
    <script>
    fetch("/header.html")
        .then(res => res.text())
        .then(data => document.getElementById("global-header").innerHTML = data);
</script>
</body>
</html>
